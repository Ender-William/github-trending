<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub 热门项目 🎵</title>
  <style>
    :root {
      --bg-primary: #2c2c2c;
      --bg-secondary: #1a1a1a;
      --bg-card: #3d3d3d;
      --text-primary: #f0e68c;
      --text-secondary: #daa520;
      --accent: #ff6b6b;
      --accent-secondary: #4ecdc4;
      --border: #555;
      --tape-reel: #1a1a1a;
      --tape-spoke: #f0e68c;
      --warm-glow: rgba(255, 107, 107, 0.3);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: #f5f0e1;
        --bg-secondary: #e8e0d0;
        --bg-card: #fffef5;
        --text-primary: #4a4a4a;
        --text-secondary: #8b7355;
        --accent: #d35400;
        --accent-secondary: #27ae60;
        --border: #c9b896;
        --tape-reel: #2c2c2c;
        --tape-spoke: #f5f0e1;
        --warm-glow: rgba(211, 84, 0, 0.2);
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Courier New', Courier, monospace;
      background: var(--bg-primary);
      min-height: 100vh;
      color: var(--text-primary);
      padding: 20px;
      background-image: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.1) 2px,
          rgba(0,0,0,0.1) 4px
        );
    }

    .tape-decoration {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 80px;
      height: 50px;
      background: linear-gradient(180deg, #333 0%, #222 100%);
      border-radius: 8px;
      border: 3px solid #666;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 100;
    }

    .tape-decoration::before {
      content: 'A';
      color: #888;
      font-size: 12px;
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
    }

    .reel {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle, #444 30%, #222 100%);
      position: relative;
      animation: spin 2s linear infinite;
    }

    .reel::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background: var(--tape-spoke);
      border-radius: 50%;
    }

    .reel::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 18px;
      height: 18px;
      border: 2px dashed #555;
      border-radius: 50%;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .cassette-label {
      background: linear-gradient(135deg, #f5e6c4 0%, #e8d5a3 100%);
      border-radius: 12px;
      padding: 20px 30px;
      margin-bottom: 30px;
      box-shadow: 
        0 4px 0 #c9b896,
        0 8px 20px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    .cassette-label::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 30px;
      background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, transparent 100%);
    }

    .cassette-label.dark::before {
      background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
    }

    .dark .cassette-label {
      background: linear-gradient(135deg, #4a4a4a 0%, #333 100%);
      box-shadow: 
        0 4px 0 #222,
        0 8px 20px rgba(0,0,0,0.5);
    }
    
    header {
      text-align: center;
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 4px;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
    }

    .dark h1 {
      color: #f5e6c4;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    }
    
    .subtitle {
      color: #666;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }

    .dark .subtitle {
      color: #aaa;
    }
    
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin: 25px 0;
      flex-wrap: wrap;
    }

    .date-picker {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #222;
      padding: 10px 20px;
      border-radius: 25px;
      border: 2px solid #444;
    }

    .dark .date-picker {
      background: #f5f0e1;
      border-color: #c9b896;
    }

    .date-picker label {
      color: #888;
      font-size: 0.8rem;
      text-transform: uppercase;
    }

    .dark .date-picker label {
      color: #666;
    }
    
    .date-picker input {
      padding: 8px 12px;
      border-radius: 15px;
      border: 2px solid #555;
      background: #333;
      color: #f0e68c;
      font-size: 0.9rem;
      font-family: inherit;
      width: 140px;
    }

    /* Calendar icon - light mode (white icon) */
    .date-picker input::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }
    .date-picker input::-moz-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    /* Calendar icon - dark mode (dark icon) */
    .dark .date-picker input::-webkit-calendar-picker-indicator {
      filter: invert(0.3);
      cursor: pointer;
    }
    .dark .date-picker input::-moz-calendar-picker-indicator {
      filter: invert(0.3);
      cursor: pointer;
    }

    .dark .date-picker input {
      background: #fff;
      color: #333;
      border-color: #c9b896;
    }
    
    .date-picker button {
      padding: 8px 20px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(180deg, #ff6b6b 0%, #ee5a5a 100%);
      color: #fff;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 3px 0 #c44;
    }

    .dark .date-picker button {
      background: linear-gradient(180deg, #d35400 0%, #a04000 100%);
      box-shadow: 0 3px 0 #803000;
    }
    
    .date-picker button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #c44;
    }

    .dark .date-picker button:hover {
      box-shadow: 0 5px 0 #803000;
    }

    .date-picker button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #c44;
    }

    .dark .date-picker button:active {
      box-shadow: 0 1px 0 #803000;
    }
    
    .alert {
      padding: 12px 20px;
      border-radius: 8px;
      background: #2a1f1f;
      color: #ff6b6b;
      text-align: center;
      margin-bottom: 20px;
      display: none;
      border: 2px solid #ff6b6b;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.85rem;
    }

    .dark .alert {
      background: #f5e6c4;
      color: #d35400;
      border-color: #d35400;
    }
    
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0 30px;
    }
    
    .stat {
      text-align: center;
      padding: 15px 30px;
      background: var(--bg-card);
      border-radius: 8px;
      border: 3px solid var(--border);
      min-width: 150px;
    }

    .stat::before {
      content: '◼';
      color: var(--accent);
      margin-right: 8px;
    }

    .stat:last-child::before {
      color: var(--accent-secondary);
    }
    
    .stat-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--accent);
    }

    .stat:last-child .stat-value {
      color: var(--accent-secondary);
    }
    
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }
    
    .project-card {
      background: var(--bg-card);
      border-radius: 10px;
      padding: 20px;
      border: 3px solid var(--border);
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
    }

    .project-card::before {
      content: '▸';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 1.2rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .project-card:hover::before {
      opacity: 1;
    }
    
    .project-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 8px 25px var(--warm-glow);
    }
    
    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      padding-left: 20px;
    }
    
    .project-name {
      font-size: 1rem;
      font-weight: bold;
      color: var(--accent);
      word-break: break-all;
    }
    
    .project-stars {
      background: rgba(255,215,0,0.2);
      color: #ffd700;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: bold;
      white-space: nowrap;
    }

    .dark .project-stars {
      background: rgba(211, 84, 0, 0.2);
      color: #d35400;
    }
    
    .project-desc {
      color: var(--text-secondary);
      font-size: 0.85rem;
      line-height: 1.5;
      margin-bottom: 6px;
      padding-left: 20px;
    }
    
    .project-desc-zh {
      color: var(--text-primary);
      font-size: 0.8rem;
      line-height: 1.4;
      margin-bottom: 12px;
      padding-left: 20px;
      font-style: italic;
      opacity: 0.8;
    }
    
    .project-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-left: 20px;
      border-top: 1px dashed var(--border);
      padding-top: 12px;
    }
    
    .project-language {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--accent-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
    }
    
    .language-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-secondary);
    }
    
    .project-link {
      color: var(--text-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-secondary);
    }

    .loading::before {
      content: '♪ ';
      font-size: 1.5rem;
    }

    .loading::after {
      content: ' ♪';
      font-size: 1.5rem;
    }
    
    .last-update {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.75rem;
      margin-top: 40px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .vcr-display {
      background: #111;
      color: #0f0;
      padding: 8px 16px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      display: inline-block;
    }

    .dark .vcr-display {
      background: #f5f0e1;
      color: #333;
    }

    @media (max-width: 768px) {
      .projects-grid {
        grid-template-columns: 1fr;
      }

      .tape-decoration {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="tape-decoration">
    <div class="reel"></div>
    <div class="reel"></div>
  </div>

  <div class="container">
    <div class="cassette-label">
      <header>
        <h1>🎵 GitHub 热门项目</h1>
        <p class="subtitle">Daily Trending Tapes</p>
      </header>
    </div>
    
    <div class="controls">
      <div class="date-picker">
        <label>▸ Date:</label>
        <input type="date" id="dateInput">
        <button onclick="loadProjects()">▶ Play</button>
      </div>
    </div>
    
    <div class="alert" id="alert"></div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="projectCount">--</div>
        <div class="stat-label">Tracks</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalStars">----</div>
        <div class="stat-label">Total Stars</div>
      </div>
    </div>
    
    <div class="projects-grid" id="projects">
      <div class="loading">
        <p>Loading tapes...</p>
      </div>
    </div>
    
    <p class="last-update">
      <span class="vcr-display" id="lastUpdate">--:--:--</span>
    </p>
  </div>
  
  <script>
    let latestDate = null;

    // Check dark mode
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (isDark) {
      document.body.classList.add('dark');
      document.querySelector('.cassette-label').classList.add('dark');
    }
    
    // Initialize date picker
    async function initDatePicker() {
      try {
        const response = await fetch('/api/dates');
        const data = await response.json();
        
        if (data.dates && data.dates.length > 0) {
          latestDate = data.latest;
          const today = new Date().toISOString().split('T')[0];
          
          const dateInput = document.getElementById('dateInput');
          dateInput.max = today;
          dateInput.value = today;
          dateInput.min = data.dates[0];
        }
      } catch (e) {
        console.error('Error initializing date picker:', e);
      }
    }
    
    async function loadProjects() {
      const dateInput = document.getElementById('dateInput');
      const selectedDate = dateInput.value;
      const alertEl = document.getElementById('alert');
      
      try {
        const response = await fetch('/api/projects?date=' + selectedDate);
        const projects = await response.json();
        
        const container = document.getElementById('projects');
        
        if (!projects || projects.length === 0) {
          alertEl.style.display = 'block';
          alertEl.textContent = '⚠ No tape found for this date - playing latest';
          
          const latestResponse = await fetch('/api/projects?date=' + latestDate);
          const latestProjects = await latestResponse.json();
          
          document.getElementById('projectCount').textContent = latestProjects.length;
          const totalStars = latestProjects.reduce((sum, p) => sum + (p.stars || 0), 0);
          document.getElementById('totalStars').textContent = totalStars.toLocaleString();
          
          if (latestProjects[0]?.fetched_date) {
            document.getElementById('lastUpdate').textContent = 'TAPE: ' + latestProjects[0].fetched_date;
          }
          
          container.innerHTML = latestProjects.map(p => createProjectCard(p)).join('');
          return;
        }
        
        alertEl.style.display = 'none';
        
        document.getElementById('projectCount').textContent = projects.length;
        const totalStars = projects.reduce((sum, p) => sum + (p.stars || 0), 0);
        document.getElementById('totalStars').textContent = totalStars.toLocaleString();
        
        if (projects[0]?.fetched_date) {
          const isToday = projects[0].fetched_date === new Date().toISOString().split('T')[0];
          document.getElementById('lastUpdate').textContent = 
            isToday ? '◉ LIVE: ' + projects[0].fetched_date : 'TAPE: ' + projects[0].fetched_date;
        }
        
        container.innerHTML = projects.map(p => createProjectCard(p)).join('');
        
      } catch (error) {
        console.error('Error loading projects:', error);
        document.getElementById('projects').innerHTML = 
          '<div class="loading"><p>Error loading tapes!</p></div>';
      }
    }
    
    function createProjectCard(p) {
      return `
        <a href="${p.url}" target="_blank" class="project-card">
          <div class="project-header">
            <span class="project-name">${escapeHtml(p.name)}</span>
            ${p.stars ? `<span class="project-stars">★ ${p.stars.toLocaleString()}</span>` : ''}
          </div>
          <p class="project-desc">${escapeHtml(p.description || 'No description')}</p>
          ${p.description_zh ? `<p class="project-desc-zh">▸ ${escapeHtml(p.description_zh)}</p>` : ''}
          <div class="project-footer">
            ${p.language ? `
              <span class="project-language">
                <span class="language-dot"></span>
                ${escapeHtml(p.language)}
              </span>
            ` : '<span class="project-language">--</span>'}
            <span class="project-link">▶ PLAY →</span>
          </div>
        </a>
      `;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Listen for theme changes
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (e.matches) {
        document.body.classList.add('dark');
        document.querySelector('.cassette-label').classList.add('dark');
      } else {
        document.body.classList.remove('dark');
        document.querySelector('.cassette-label').classList.remove('dark');
      }
    });
    
    // Initialize
    initDatePicker().then(loadProjects);
  </script>
</body>
</html>
