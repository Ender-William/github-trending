<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub 热门项目</title>
  <style>
    :root {
      --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      --bg-card: rgba(255,255,255,0.05);
      --text-primary: #fff;
      --text-secondary: #aaa;
      --text-muted: #888;
      --accent: #00d4ff;
      --accent-secondary: #7c3aed;
      --border: rgba(255,255,255,0.1);
      --stars-bg: rgba(255,215,0,0.2);
      --stars-color: #ffd700;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        --bg-card: rgba(255,255,255,0.8);
        --text-primary: #1a1a2e;
        --text-secondary: #555;
        --text-muted: #777;
        --accent: #0066cc;
        --accent-secondary: #7c3aed;
        --border: rgba(0,0,0,0.1);
        --stars-bg: rgba(255,215,0,0.15);
        --stars-color: #cc9900;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      color: var(--text-primary);
      padding: 20px;
      transition: background 0.3s ease, color 0.3s ease;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      padding: 40px 0 20px;
    }
    
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
    }
    
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    
    .date-picker {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .date-picker label {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    
    .date-picker input {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 1rem;
    }
    
    .date-picker button {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }
    
    .date-picker button:hover {
      opacity: 0.8;
    }
    
    .alert {
      padding: 12px 20px;
      border-radius: 8px;
      background: rgba(255, 165, 0, 0.2);
      color: #ffa500;
      text-align: center;
      margin-bottom: 20px;
      display: none;
    }
    
    .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px 0 40px;
    }
    
    .stat {
      text-align: center;
      padding: 15px 30px;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: var(--accent);
    }
    
    .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 5px;
    }
    
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }
    
    .project-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: block;
      backdrop-filter: blur(10px);
    }
    
    .project-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 10px 40px rgba(0,212,255,0.2);
    }
    
    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    .project-name {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
    }
    
    .project-stars {
      background: var(--stars-bg);
      color: var(--stars-color);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    
    .project-desc {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    
    .project-desc-zh {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 15px;
      font-style: italic;
    }
    
    .project-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .project-language {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    
    .language-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent-secondary);
    }
    
    .project-link {
      color: var(--accent-secondary);
      font-size: 0.85rem;
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .last-update {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 40px;
    }
    
    @media (max-width: 768px) {
      .projects-grid {
        grid-template-columns: 1fr;
      }
      
      h1 {
        font-size: 1.8rem;
      }
      
      .stats {
        gap: 15px;
      }
      
      .controls {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔥 GitHub 热门项目</h1>
      <p class="subtitle">每日更新 · 发现最受欢迎的开源项目</p>
    </header>
    
    <div class="controls">
      <div class="date-picker">
        <label>选择日期:</label>
        <input type="date" id="dateInput">
        <button onclick="loadProjects()">查看</button>
      </div>
    </div>
    
    <div class="alert" id="alert"></div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="projectCount">-</div>
        <div class="stat-label">项目数量</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalStars">-</div>
        <div class="stat-label">总 Stars</div>
      </div>
    </div>
    
    <div class="projects-grid" id="projects">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
      </div>
    </div>
    
    <p class="last-update" id="lastUpdate"></p>
  </div>
  
  <script>
    let latestDate = null;
    
    // Initialize date picker
    async function initDatePicker() {
      try {
        const response = await fetch('/api/dates');
        const data = await response.json();
        
        if (data.dates && data.dates.length > 0) {
          latestDate = data.latest;
          const today = new Date().toISOString().split('T')[0];
          
          const dateInput = document.getElementById('dateInput');
          dateInput.max = today;
          dateInput.value = today;
          
          // Set min date to the earliest available date
          dateInput.min = data.dates[0];
        }
      } catch (e) {
        console.error('Error initializing date picker:', e);
      }
    }
    
    async function loadProjects() {
      const dateInput = document.getElementById('dateInput');
      const selectedDate = dateInput.value;
      const alertEl = document.getElementById('alert');
      
      try {
        const response = await fetch('/api/projects?date=' + selectedDate);
        const projects = await response.json();
        
        const container = document.getElementById('projects');
        
        // Check if data exists for selected date
        if (!projects || projects.length === 0) {
          // Show alert and load latest data
          alertEl.style.display = 'block';
          alertEl.textContent = `该日期暂无数据，已显示最新记录`;
          
          // Load latest
          const latestResponse = await fetch('/api/projects?date=' + latestDate);
          const latestProjects = await latestResponse.json();
          
          document.getElementById('projectCount').textContent = latestProjects.length;
          const totalStars = latestProjects.reduce((sum, p) => sum + (p.stars || 0), 0);
          document.getElementById('totalStars').textContent = totalStars.toLocaleString();
          
          if (latestProjects[0]?.fetched_date) {
            document.getElementById('lastUpdate').textContent = 
              `数据日期: ${latestProjects[0].fetched_date}`;
          }
          
          container.innerHTML = latestProjects.map(p => createProjectCard(p)).join('');
          return;
        }
        
        alertEl.style.display = 'none';
        
        // Update stats
        document.getElementById('projectCount').textContent = projects.length;
        const totalStars = projects.reduce((sum, p) => sum + (p.stars || 0), 0);
        document.getElementById('totalStars').textContent = totalStars.toLocaleString();
        
        if (projects[0]?.fetched_date) {
          const isToday = projects[0].fetched_date === new Date().toISOString().split('T')[0];
          document.getElementById('lastUpdate').textContent = 
            isToday ? `最后更新: ${projects[0].fetched_date}` : `数据日期: ${projects[0].fetched_date}`;
        }
        
        // Render projects
        container.innerHTML = projects.map(p => createProjectCard(p)).join('');
        
      } catch (error) {
        console.error('Error loading projects:', error);
        document.getElementById('projects').innerHTML = 
          '<div class="loading"><p>加载失败，请刷新页面</p></div>';
      }
    }
    
    function createProjectCard(p) {
      return `
        <a href="${p.url}" target="_blank" class="project-card">
          <div class="project-header">
            <span class="project-name">${escapeHtml(p.name)}</span>
            ${p.stars ? `<span class="project-stars">⭐ ${p.stars.toLocaleString()}</span>` : ''}
          </div>
          <p class="project-desc">${escapeHtml(p.description || '暂无描述')}</p>
          ${p.description_zh ? `<p class="project-desc-zh">${escapeHtml(p.description_zh)}</p>` : ''}
          <div class="project-footer">
            ${p.language ? `
              <span class="project-language">
                <span class="language-dot"></span>
                ${escapeHtml(p.language)}
              </span>
            ` : '<span></span>'}
            <span class="project-link">查看 →</span>
          </div>
        </a>
      `;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Initialize
    initDatePicker().then(loadProjects);
  </script>
</body>
</html>
